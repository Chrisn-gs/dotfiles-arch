# ── prefix key ──────────────────────────────────────────────
# 改 Ctrl+s 为 prefix（默认是 Ctrl+b，太远了）
unbind C-b
set -g prefix "C-s"
bind C-s send-prefix

# ── plugins ────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'           # 插件管理器
set -g @plugin 'tmux-plugins/tmux-sensible'  # 合理的默认配置
set -g @plugin 'tmux-plugins/tmux-cpu'       # CPU/RAM 使用率模块
set -g @plugin 'tmux-plugins/tmux-resurrect'  # 保存/恢复 session 状态
set -g @plugin 'tmux-plugins/tmux-continuum'   # 自动保存（每 5 分钟）

# ── catppuccin theme ───────────────────────────────────────
set -g @plugin "catppuccin/tmux"
set -g @catppuccin_flavour "mocha"
# 状态栏窗口名显示 #W（手动命名）而非 #T（终端标题）
# 否则 prefix+, 改名后状态栏不显示
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# ── input ──────────────────────────────────────────────────
# 解决 Esc 延迟（vim 用户必须）
set -s escape-time 0

# ── window naming ──────────────────────────────────────────
# 新窗口自动用当前命令名（zsh/nvim/python 等）
set -g automatic-rename on
# 手动重命名（prefix+,）后锁定，不被自动覆盖
set-option -g allow-rename off

# ── history ────────────────────────────────────────────────
set -g history-limit 10000

# ── terminal ───────────────────────────────────────────────
# 修复颜色错乱（某些终端配色方案需要）
set -g default-terminal "tmux-256color"

# ── index ──────────────────────────────────────────────────
# 窗口和面板编号从 1 开始（离 prefix 键更近）
set -g base-index 1
set -g pane-base-index 1
# 关闭中间窗口后自动重编号（1,2,4 → 1,2,3）
set -g renumber-windows on

# ── mouse ──────────────────────────────────────────────────
set -g mouse on

# ── pane exit ──────────────────────────────────────────────
# prefix+x 直接关闭面板，不再弹确认框
unbind x
bind x kill-pane

# ── copy mode (vi) ────────────────────────────────────────
# v 选中，C-v 矩形选，y 复制到系统剪贴板，Esc 退出
# 注意：Linux 用 wl-copy 替代 Mac 的 pbcopy
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi Escape send-keys -X cancel

# ── window switching ───────────────────────────────────────
# Alt+[ / Alt+] 切换窗口（不需要 prefix）
bind -n M-[ previous-window
bind -n M-] next-window

# ── session switching ─────────────────────────────────────
# Alt+{ / Alt+} 切换 session（不需要 prefix）
bind -n "M-{" switch-client -p
bind -n "M-}" switch-client -n

# ── clipboard ──────────────────────────────────────────────
# prefix+p 粘贴系统剪贴板内容
# 注意：Linux 用 wl-paste 替代 Mac 的 pbpaste
bind p run "wl-paste | tmux load-buffer - && tmux paste-buffer -p"


# ── status bar (right side) ────────────────────────────────
# 右侧：目录 + CPU/RAM（tmux 原生风格，不用 catppuccin 模块）
set -g status-right-length 100
set -g status-right " #{b:pane_current_path}  CPU:#{cpu_percentage}  RAM:#{ram_percentage} "

# ── resurrect + continuum ──────────────────────────────────
# 保存内容：面板内容、窗口目录、命令历史
set -g @resurrect-capture-pane-contents "on"
# 保存这些程序的状态（重启后自动恢复）
set -g @resurrect-processes '"~yazi->yazi" "~btop->btop"'
# continuum 自动保存间隔（分钟）
set -g @continuum-save-interval "5"
# 开机自动恢复（需要配合 tmux 自启动）
# set -g @continuum-restore "on"
# 状态栏显示自动保存状态
set -g @continuum-save-interval "5"


# ── workspace menu ──────────────────────────────────────────
# prefix+m 呼出工作区菜单
bind m display-menu -T "workplace" \
    "1 dev (nvim)"         1 "run-shell '~/.config/tmux/scripts/tmux-dev.sh'" \
    "2 monitor (btop)"     2 "new-window -n monitor btop" \
    "3 hermes+shell+yazi"  3 "run-shell '~/.config/tmux/scripts/tmux-hermes.sh'" \
    "4 关闭当前session"    4 "kill-session" \
    "5 关闭全部session"    5 "kill-server" \
    "" \
    "q 退出"               q ""



# ── menu style (Catppuccin Mocha) ──────────────────────────
set -g menu-style "fg=#cdd6f4,bg=#1e1e2e"
set -g menu-selected-style "fg=#1e1e2e,bg=#89b4fa,bold"
set -g menu-border-style "fg=#89b4fa"
set -g menu-border-lines "rounded"



# ── pane split (prefix+hjkl) ───────────────────────────────
# prefix+h/j/k/l 分屏（h=左，j=下，k=上，l=右）
bind h split-window -h -c "#{pane_current_path}" -b  # 左分屏
bind j split-window -v -c "#{pane_current_path}"     # 下分屏
bind k split-window -v -c "#{pane_current_path}" -b  # 上分屏
bind l split-window -h -c "#{pane_current_path}"     # 右分屏



# ── resurrect shortcuts ────────────────────────────────────
# prefix+f 保存 session（f=file）
# prefix+g 恢复 session（g=get）
bind f run-shell "~/.tmux/plugins/tmux-resurrect/scripts/save.sh"
bind g run-shell "~/.tmux/plugins/tmux-resurrect/scripts/restore.sh"


# ── tpm (must be last line) ────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
